# Status bar at top
set-option -g status-position top

# Minimal colors - black background
set-option -g status-style bg=black,fg=white

# Center window list
set-option -g status-justify centre

# Minimal left/right status sections
set-option -g status-left ''
set-option -g status-right ''

# Current window highlighting (subtle)
set-option -g window-status-current-style bg=black,fg=white,bold

# Regular windows
set-option -g window-status-style bg=black,fg=grey

# Pane borders (minimal)
set-option -g pane-border-style fg=black
set-option -g pane-active-border-style fg=white

# Start window numbering at 1
set-option -g base-index 1

# Start pane numbering at 1
set-option -g pane-base-index 1
